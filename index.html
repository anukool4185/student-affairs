<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบจัดเก็บข้อมูลและรูปภาพนักเรียน</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #f4f6f9;
    }
    #loader {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f6f9;
      font-family: 'Sarabun', sans-serif;
      color: #64748b;
      font-size: 14px;
      z-index: 1;
      transition: opacity 0.3s ease;
    }
    #loader.hide {
      opacity: 0;
      pointer-events: none;
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div id="loader">กำลังโหลดระบบ...</div>

  <!--
    ลิงก์ด้านล่างคือ Apps Script Web App URL ของระบบจัดเก็บข้อมูลและรูปภาพนักเรียน
    ถ้าต้อง Deploy เวอร์ชันใหม่แล้วได้ลิงก์เปลี่ยน ให้มาแก้ src= ตรงนี้จุดเดียว
  -->
  <iframe
    src="https://script.google.com/macros/s/AKfycbwL068zVo9K9ogk0q4p4lIfW8NONibYCmPwHefFhsy6A0Ja80MedXiz9hPYAFi6fdFN/exec"
    title="ระบบจัดเก็บข้อมูลและรูปภาพนักเรียน"
    onload="document.getElementById('loader').classList.add('hide')"
    allow="clipboard-write">
  </iframe>

</body>
</html>
